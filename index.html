<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Pro Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: white;
}

/* layout */
.container {
    display: flex;
    height: 100vh;
}

/* sidebar */
.sidebar {
    width: 250px;
    background: #0f172a;
    padding: 20px;
}

.logo {
    font-size: 18px;
    font-weight: bold;
    color: #60a5fa;
    margin-bottom: 20px;
}

/* main */
.main {
    flex: 1;
    padding: 30px;
}

/* cards */
.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
}

.status {
    font-size: 20px;
    font-weight: bold;
}

/* buttons */
button {
    padding: 12px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }
.yellow { background: #eab308; }

/* log */
.log {
    height: 200px;
    background: black;
    padding: 10px;
    font-family: monospace;
    overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
    <div class="logo">⚡ PRO PANEL</div>
    <div>Dashboard</div>
</div>

<div class="main">

    <div class="card">
        <div>Status: <span id="state">Loading...</span></div>
        <div>Players: <span id="players">-</span></div>
    </div>

    <div class="card">
        <button class="blue" onclick="start()">Start</button>
        <button class="red" onclick="stop()">Stop</button>
        <button class="yellow" onclick="restart()">Restart</button>

        <button class="green" onclick="cmd('gamemode survival')">Survival</button>
    </div>

    <div class="card log" id="log"></div>

</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

function log(msg){
    document.getElementById("log").innerHTML += msg + "<br>";
}

function start(){
    fetch(API+"/start",{headers:{"x-api-key":KEY}});
    log("🚀 Starting...");
}

function stop(){
    fetch(API+"/stop",{headers:{"x-api-key":KEY}});
    log("⛔ Stopping...");
}

function restart(){
    fetch(API+"/restart",{headers:{"x-api-key":KEY}});
    log("🔄 Restarting...");
}

function cmd(c){
    fetch(API+"/command",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "x-api-key":KEY
        },
        body:JSON.stringify({command:c})
    });

    log("▶ "+c);
}

async function update(){
    const res = await fetch(API+"/status");
    const data = await res.json();

    document.getElementById("state").innerText = data.state;
    document.getElementById("players").innerText = data.players;
}

setInterval(update, 3000);
update();

</script>

</body>
</html>
