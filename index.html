<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Control Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.panel {
    max-width: 520px;
    margin: 40px auto;
    background: #111827;
    padding: 20px;
    border-radius: 12px;
}

button {
    width: 90%;
    padding: 14px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
}

.green { background: #22c55e; }
.yellow { background: #eab308; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }

.status {
    margin-top: 10px;
    color: #94a3b8;
}
</style>
</head>

<body>

<h1>🔥 Minecraft Control Panel</h1>

<div class="panel">

    <!-- SERVER CONTROL -->
    <button class="blue" onclick="startServer()">▶ Start Server</button>
    <button class="red" onclick="stopServer()">⛔ Stop Server</button>
    <button class="blue" onclick="restartServer()">🔄 Restart Server</button>

    <!-- GAME CONTROLS -->
    <button class="green" onclick="send('gamemode survival')">Survival</button>
    <button class="yellow" onclick="send('difficulty hard')">Hardcore</button>

    <div class="status" id="status">Loading...</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

// COMMANDS
function send(command){
    fetch(API + "/command", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": KEY
        },
        body: JSON.stringify({ command })
    });

    document.getElementById("status").innerText =
        "Sent: " + command;
}

// START
function startServer(){
    fetch(API + "/start", {
        method: "POST",
        headers: { "x-api-key": KEY }
    });

    document.getElementById("status").innerText =
        "Starting server...";
}

// STOP
function stopServer(){
    fetch(API + "/stop", {
        method: "POST",
        headers: { "x-api-key": KEY }
    });

    document.getElementById("status").innerText =
        "Stopping server...";
}

// RESTART
function restartServer(){
    fetch(API + "/restart", {
        method: "POST",
        headers: { "x-api-key": KEY }
    });

    document.getElementById("status").innerText =
        "Restarting server...";
}

// STATUS LOOP
async function update(){
    try {
        const res = await fetch(API + "/status");
        const data = await res.json();

        document.getElementById("status").innerText =
            data.online ? "🟢 Online | " + data.players : "🔴 Offline";

    } catch {
        document.getElementById("status").innerText =
            "⚠️ Connection error";
    }
}

setInterval(update, 5000);
update();

</script>

</body>
</html>
