<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EpicCraft Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #0b0f14;
    color: white;
}

header {
    background: #111827;
    padding: 20px;
    text-align: center;
    font-weight: 700;
    border-bottom: 1px solid #1f2937;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 30px;
}

.card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

/* buttons */
button {
    padding: 12px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    color: white;
}

.start { background: #22c55e; }
.stop { background: #ef4444; }
.restart { background: #3b82f6; }

button:hover {
    opacity: 0.85;
}

/* status */
.status {
    font-size: 18px;
    font-weight: 600;
}

/* console */
.console {
    background: black;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    border-radius: 8px;
    color: #22c55e;
}
</style>

</head>

<body>

<header>
    ⛏ EpicCraft Control Panel
</header>

<div class="container">

    <!-- STATUS -->
    <div class="card">
        <div>Status: <span id="state">Loading...</span></div>
        <div>Players: <span id="players">-</span></div>
    </div>

    <!-- CONTROLS -->
    <div class="card">
        <button class="start" onclick="startServer()">Start</button>
        <button class="stop" onclick="stopServer()">Stop</button>
        <button class="restart" onclick="restartServer()">Restart</button>
    </div>

    <!-- LOG -->
    <div class="card">
        <div class="console" id="log"></div>
    </div>

</div>

<script>

const API = "https://YOUR-NGROK-LINK.ngrok-free.dev";
const KEY = "my-secret-key-123";

/* reusable headers (IMPORTANT FIX) */
const headers = {
    "Content-Type": "application/json",
    "x-api-key": KEY
};

function log(msg){
    document.getElementById("log").innerHTML += "» " + msg + "<br>";
}

/* START */
function startServer(){
    fetch(API + "/start", {
        method: "POST",
        headers
    });

    log("Server starting...");
}

/* STOP */
function stopServer(){
    fetch(API + "/stop", {
        method: "POST",
        headers
    });

    log("Server stopping...");
}

/* RESTART */
function restartServer(){
    fetch(API + "/restart", {
        method: "POST",
        headers
    });

    log("Server restarting...");
}

/* STATUS CHECK */
async function update(){
    try {
        const res = await fetch(API + "/status");
        const data = await res.json();

        document.getElementById("state").innerText = data.state;
        document.getElementById("players").innerText = data.players;

    } catch {
        document.getElementById("state").innerText = "OFFLINE";
    }
}

setInterval(update, 3000);
update();

</script>

</body>
</html>
