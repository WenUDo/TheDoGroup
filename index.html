<!DOCTYPE html>
<html>
<head>
<title>Minecraft Network Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0f1a;
color:white;
font-family:Arial;
display:flex;
}

.sidebar{
width:220px;
background:#111827;
height:100vh;
padding:10px;
}

.sidebar h2{
font-family:"Press Start 2P";
font-size:12px;
text-align:center;
}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
background:#1f2937;
color:white;
border:none;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
}

.card{
background:#111827;
padding:15px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #1f2937;
}

button{
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
margin:3px;
}

.green{background:#22c55e}
.red{background:#ef4444}
.blue{background:#3b82f6}

.console{
background:black;
height:250px;
overflow:auto;
padding:10px;
font-family:monospace;
color:#55ff55;
}

.badge{
padding:5px 10px;
border-radius:20px;
display:inline-block;
}

.online{background:#22c55e}
.offline{background:#ef4444}
.starting{background:#facc15}

</style>
</head>

<body>

<div class="sidebar">
<h2>MINE PANEL</h2>
<button onclick="show('dash')">Dashboard</button>
<button onclick="show('ops')">Operator</button>
<button onclick="show('players')">Players</button>
<button onclick="show('console')">Console</button>
</div>

<div class="main">

<div id="dash">
<div class="card">
<h3>Status: <span id="status">...</span></h3>
<p>RAM: <span id="ram">-</span> MB</p>

<button class="green" onclick="start()">Start</button>
<button class="red" onclick="stop()">Stop</button>
<button class="blue" onclick="restart()">Restart</button>
</div>
</div>

<div id="ops" style="display:none">
<div class="card">
<h3>Operator Tools</h3>
<button onclick="cmd('gamemode creative @a')">Creative</button>
<button onclick="cmd('gamemode survival @a')">Survival</button>
<button onclick="cmd('time set day')">Day</button>
<button onclick="cmd('weather clear')">Clear</button>
</div>
</div>

<div id="players" style="display:none">
<div class="card">
<h3>Players</h3>
<div id="plist"></div>

<input id="pname" placeholder="player">
<button class="red" onclick="kick()">Kick</button>
<button class="red" onclick="ban()">Ban</button>
</div>
</div>

<div id="console" style="display:none">
<div class="card">
<h3>Console</h3>
<div id="log" class="console"></div>
</div>
</div>

</div>

<script>

const API="https://flashy-stardust-endless.ngrok-free.dev";
const KEY="my-secret-key-123";

function show(id){
document.querySelectorAll('.main > div').forEach(d=>d.style.display='none');
document.getElementById(id).style.display='block';
}

function start(){fetch(API+"/start",{method:"POST",headers:{"x-api-key":KEY}})}
function stop(){fetch(API+"/stop",{method:"POST",headers:{"x-api-key":KEY}})}
function restart(){fetch(API+"/restart",{method:"POST",headers:{"x-api-key":KEY}})}

function cmd(c){
fetch(API+"/command",{
method:"POST",
headers:{"Content-Type":"application/json","x-api-key":KEY},
body:JSON.stringify({command:c})
})
}

function kick(){
fetch(API+"/kick",{
method:"POST",
headers:{"Content-Type":"application/json","x-api-key":KEY},
body:JSON.stringify({player:document.getElementById("pname").value})
})
}

function ban(){
fetch(API+"/ban",{
method:"POST",
headers:{"Content-Type":"application/json","x-api-key":KEY},
body:JSON.stringify({player:document.getElementById("pname").value})
})
}

async function update(){

const s=await fetch(API+"/status").then(r=>r.json());
document.getElementById("status").innerText=s.state;

const st=await fetch(API+"/stats").then(r=>r.json());
document.getElementById("ram").innerText=st.ram;

const p=await fetch(API+"/players").then(r=>r.json());
document.getElementById("plist").innerText=p.raw;

const c=await fetch(API+"/console").then(r=>r.json());
document.getElementById("log").innerHTML=c.logs.join("<br>");
}

setInterval(update,3000);
update();

</script>

</body>
</html>
