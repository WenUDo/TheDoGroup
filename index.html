<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: #0b0f19;
    color: white;
}

/* top bar */
.topbar {
    padding: 20px 30px;
    background: #0f172a;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand {
    font-weight: 700;
    color: #60a5fa;
}

/* layout */
.wrapper {
    padding: 30px;
    max-width: 900px;
    margin: auto;
}

/* status card */
.card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
}

/* status */
.status {
    font-size: 18px;
    font-weight: 600;
}

/* buttons */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    color: white;
}

.start { background: #22c55e; }
.stop { background: #ef4444; }
.restart { background: #3b82f6; }

button:hover {
    opacity: 0.85;
}

/* info row */
.info {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    color: #9ca3af;
    font-size: 14px;
}

/* console */
.console {
    background: #000;
    border-radius: 12px;
    padding: 12px;
    height: 180px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 12px;
    color: #22c55e;
}
</style>

</head>

<body>

<div class="topbar">
    <div class="brand">⚡ Minecraft Panel</div>
    <div id="state">Loading...</div>
</div>

<div class="wrapper">

    <!-- STATUS -->
    <div class="card">
        <div class="status">Server Status: <span id="status">...</span></div>

        <div class="info">
            <div>Players: <span id="players">-</span></div>
            <div>Panel: Online</div>
        </div>

        <div class="buttons">
            <button class="start" onclick="start()">Start</button>
            <button class="stop" onclick="stop()">Stop</button>
            <button class="restart" onclick="restart()">Restart</button>
        </div>
    </div>

    <!-- CONSOLE -->
    <div class="card">
        <div style="margin-bottom:10px; color:#9ca3af;">Console</div>
        <div class="console" id="log"></div>
    </div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

function log(t){
    document.getElementById("log").innerHTML += t + "<br>";
}

function start(){
    fetch(API+"/start",{headers:{"x-api-key":KEY}});
    log("> start");
}

function stop(){
    fetch(API+"/stop",{headers:{"x-api-key":KEY}});
    log("> stop");
}

function restart(){
    fetch(API+"/restart",{headers:{"x-api-key":KEY}});
    log("> restart");
}

async function update(){
    try {
        const res = await fetch(API+"/status");
        const data = await res.json();

        document.getElementById("status").innerText =
            data.state;

        document.getElementById("players").innerText =
            data.players;
    } catch {
        document.getElementById("status").innerText = "offline";
    }
}

setInterval(update, 3000);
update();

</script>

</body>
</html>
