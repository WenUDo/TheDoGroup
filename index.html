<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Control Panel</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        .panel {
            background: #1e293b;
            width: 350px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        button {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            background: #3b82f6;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        .danger {
            background: #ef4444;
        }

        .danger:hover {
            background: #dc2626;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎮 Minecraft Control Panel</h1>

    <div class="panel">

        <button onclick="send('/survival')">🟢 Survival Mode</button>

        <button onclick="send('/hardcore')">☠️ Hardcore Mode</button>

        <button class="danger" onclick="send('/stop')">🔴 Stop Server</button>

        <div class="status" id="status">
            Ready to send commands
        </div>

    </div>

</div>

<script>
function send(endpoint){
    fetch("http://localhost:3000" + endpoint, {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("status").innerText =
            "Command sent: " + endpoint;
    })
    .catch(err => {
        document.getElementById("status").innerText =
            "Error sending command";
    });
}
</script>

</body>
</html>
