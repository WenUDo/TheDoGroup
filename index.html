<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Control Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

.header {
    padding: 40px;
}

h1 {
    font-size: 40px;
    margin-bottom: 5px;
}

.subtitle {
    color: #94a3b8;
}

.panel {
    max-width: 500px;
    margin: auto;
    margin-top: 30px;
    background: #111827;
    padding: 20px;
    border-radius: 12px;
}

button {
    width: 90%;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    color: white;
}

.green { background: #22c55e; }
.yellow { background: #eab308; }
.red { background: #ef4444; }

.status {
    margin-top: 15px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="header">
    <h1>🔥 My Minecraft Server</h1>
    <div class="subtitle">Control Panel Dashboard</div>
</div>

<div class="panel">

    <button class="green" onclick="send('gamemode survival')">🟢 Survival</button>
    <button class="yellow" onclick="send('difficulty hard')">☠️ Hardcore (Hard Mode)</button>
    <button class="red" onclick="send('stop')">🔴 Stop Server</button>

    <div class="status" id="status">Ready</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

// SEND COMMAND (FIXED + WORKING)
function send(command){
    fetch(API + "/command", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": KEY
        },
        body: JSON.stringify({ command })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            document.getElementById("status").innerText =
                "Sent: " + command;
        } else {
            document.getElementById("status").innerText =
                "Failed (check server)";
        }
    })
    .catch(() => {
        document.getElementById("status").innerText =
            "Connection error";
    });
}

</script>

</body>
</html>
