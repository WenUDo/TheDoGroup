<!DOCTYPE html>
<html>
<head>
<title>Minecraft Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

.header {
    padding: 20px;
    text-align: center;
    font-size: 20px;
}

.panel {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }

.console {
    background: black;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    color: #55ff55;
}
</style>
</head>

<body>

<div class="header">🔥 MINECRAFT CONTROL PANEL</div>

<div class="panel">

<div class="card">
<h3>Status: <span id="status">...</span></h3>
<p>Players: <span id="players">-</span></p>

<button class="green" onclick="start()">Start</button>
<button class="red" onclick="stop()">Stop</button>
<button class="blue" onclick="restart()">Restart</button>
</div>

<div class="card">
<h3>Console</h3>
<div id="log" class="console"></div>
<input id="cmd" placeholder="command..." />
<button onclick="sendCmd()">Send</button>
</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

/* STATUS */
async function update(){
    try {
        const s = await fetch(API + "/status").then(r => r.json());
        document.getElementById("status").innerText = s.state;

        const p = await fetch(API + "/players").then(r => r.json());
        document.getElementById("players").innerText = p.players;

        const c = await fetch(API + "/console").then(r => r.json());
        document.getElementById("log").innerHTML = c.logs.join("<br>");

    } catch (e) {
        console.log("connection failed");
    }
}

/* COMMAND */
function sendCmd(){
    const command = document.getElementById("cmd").value;

    fetch(API + "/command", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": KEY
        },
        body: JSON.stringify({ command })
    });
}

/* SERVER */
function start(){
    fetch(API + "/start", { method:"POST", headers:{ "x-api-key": KEY } });
}

function stop(){
    fetch(API + "/stop", { method:"POST", headers:{ "x-api-key": KEY } });
}

function restart(){
    fetch(API + "/restart", { method:"POST", headers:{ "x-api-key": KEY } });
}

setInterval(update, 2000);
update();

</script>

</body>
</html>
