<!DOCTYPE html>
<html>
<head>
<title>MC Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:220px;
    background:#020617;
    padding:15px;
}

.sidebar h2 {
    margin-bottom:20px;
}

.sidebar button {
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#111827;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* MAIN */
.main {
    flex:1;
    padding:20px;
}

.card {
    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

/* BUTTONS */
button {
    padding:8px 12px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.green { background:#22c55e; color:black; }
.red { background:#ef4444; }
.blue { background:#3b82f6; }
.gray { background:#374151; }

/* CONSOLE */
.console {
    background:black;
    height:220px;
    overflow:auto;
    padding:10px;
    font-family:monospace;
    color:#55ff55;
}

/* INPUT */
input {
    padding:10px;
    width:70%;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>MC PANEL</h2>
    <button onclick="show('dash')">Dashboard</button>
    <button onclick="show('players')">Players</button>
    <button onclick="show('console')">Console</button>
    <button onclick="show('ops')">Operator</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dash">
    <div class="card">
        <h3>Status: <span id="status">...</span></h3>
        <p>Players: <span id="playerCount">-</span></p>

        <button class="green" onclick="start()">Start</button>
        <button class="red" onclick="stop()">Stop</button>
        <button class="blue" onclick="restart()">Restart</button>
    </div>
</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
    <div class="card">
        <h2>Players</h2>
        <div id="playerList">Loading...</div>
    </div>
</div>

<!-- CONSOLE -->
<div id="console" style="display:none">
    <div class="card">
        <h2>Console</h2>
        <div id="log" class="console"></div>

        <input id="cmdInput" placeholder="Type command...">
        <button onclick="runCmd()">Send</button>
    </div>
</div>

<!-- OPERATOR -->
<div id="ops" style="display:none">

    <div class="card">
        <h3>Gamemode</h3>
        <button onclick="cmd('gamemode creative @a')">Creative</button>
        <button onclick="cmd('gamemode survival @a')">Survival</button>
        <button onclick="cmd('gamemode spectator @a')">Spectator</button>
    </div>

    <div class="card">
        <h3>Time</h3>
        <button onclick="cmd('time set day')">Day</button>
        <button onclick="cmd('time set night')">Night</button>
    </div>

    <div class="card">
        <h3>Weather</h3>
        <button onclick="cmd('weather clear')">Clear</button>
        <button onclick="cmd('weather rain')">Rain</button>
        <button onclick="cmd('weather thunder')">Thunder</button>
    </div>

    <div class="card">
        <h3>Difficulty</h3>
        <button onclick="cmd('difficulty peaceful')">Peaceful</button>
        <button onclick="cmd('difficulty hard')">Hard</button>
    </div>

</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

/* NAVIGATION */
function show(page){
    document.querySelectorAll('.main > div').forEach(d => d.style.display="none");
    document.getElementById(page).style.display="block";
}

/* SERVER CONTROL */
function send(path, msg){
    log(msg);

    fetch(API + path, {
        method: "POST",
        headers: { "x-api-key": KEY }
    }).catch(() => log("❌ Connection failed"));
}

function start(){ send("/start","Starting server..."); }
function stop(){ send("/stop","Stopping server..."); }
function restart(){ send("/restart","Restarting server..."); }

/* COMMAND SYSTEM */
function cmd(command){
    log("Running: " + command);

    fetch(API + "/command", {
        method: "POST",
        headers: {
            "Content-Type":"application/json",
            "x-api-key": KEY
        },
        body: JSON.stringify({ command })
    }).catch(() => log("❌ Command failed"));
}

function runCmd(){
    const input = document.getElementById("cmdInput").value;
    if(!input) return;
    cmd(input);
}

/* LOG */
function log(t){
    const el = document.getElementById("log");
    el.innerHTML += "» " + t + "<br>";
    el.scrollTop = el.scrollHeight;
}

/* LIVE UPDATES */
async function update(){
    try{
        const status = await fetch(API + "/status").then(r=>r.json());
        document.getElementById("status").innerText = status.state;

        const players = await fetch(API + "/players").then(r=>r.json());
        document.getElementById("playerList").innerText = players.players;
        document.getElementById("playerCount").innerText = players.players;

        const logs = await fetch(API + "/console").then(r=>r.json());
        document.getElementById("log").innerHTML = logs.logs.join("<br>");

    }catch{
        log("⚠ Cannot connect to panel");
    }
}

setInterval(update,2000);
update();

</script>

</body>
</html>
