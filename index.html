<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Network</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: radial-gradient(circle at top, #0b1220, #05070a);
    color: white;
}

header {
    text-align: center;
    padding: 50px 20px;
}

h1 {
    font-family: "Press Start 2P";
    font-size: 18px;
}

.sub {
    color: #9ca3af;
    margin-top: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 16px;
}

.badge {
    margin-top: 10px;
    padding: 6px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.online { background: #14532d; color: #22c55e; }
.offline { background: #7f1d1d; color: #ef4444; }
.starting { background: #78350f; color: #facc15; }

.panel {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

button {
    padding: 10px 14px;
    margin: 6px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.green { background: #22c55e; color: black; }
.red { background: #ef4444; color: white; }
.blue { background: #3b82f6; color: white; }
.gray { background: #374151; color: white; }

.console {
    background: black;
    height: 160px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    color: #55ff55;
    border-radius: 10px;
    margin-top: 10px;
}

footer {
    text-align: center;
    padding: 30px;
    color: #666;
}
</style>

</head>

<body>

<header>
    <h1>MINECRAFT NETWORK</h1>
    <div class="sub">Survival • PvP • Economy • Events</div>
</header>

<!-- INFO -->
<div class="grid">

    <div class="card">
        <b>Status</b>
        <div id="badge" class="badge offline">OFFLINE</div>
    </div>

    <div class="card">
        <b>Server IP</b>
        <div>play.yourserver.com</div>
        <button class="green" onclick="copyIP()">Copy IP</button>
    </div>

    <div class="card">
        <b>Players</b>
        <div id="players">-</div>
    </div>

</div>

<!-- CONTROL PANEL -->
<div class="panel">

    <h2>Server Control</h2>

    <button class="green" onclick="start()">Start</button>
    <button class="red" onclick="stop()">Stop</button>
    <button class="blue" onclick="restart()">Restart</button>

    <h2>Game Controls</h2>

    <button class="green" onclick="setCreative()">Creative</button>
    <button class="gray" onclick="setHard()">Hardcore</button>

    <button class="blue" onclick="setDay()">Day</button>
    <button class="blue" onclick="setNight()">Night</button>

    <h3>Console</h3>
    <div class="console" id="log"></div>

</div>

<footer>
    Minecraft Control Panel
</footer>

    document.getElementById("log").innerHTML += "» " + t + "<br>";
}

/* COPY IP */
function copyIP(){
    navigator.clipboard.writeText("play.yourserver.com");
    log("Copied IP to clipboard");
}

    busy = true;

    log(msg);

    fetch(API + path, {
        method: "POST",
        headers
    }).catch(() => log("Connection error"))
      .finally(() => busy = false);
}
