<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(#2b5a2b, #1a1a1a);
    font-family: Inter;
    color: white;
}

/* top bar */
.top {
    background: #3a2f1f;
    padding: 18px;
    font-family: "Press Start 2P";
    font-size: 14px;
    text-align: center;
    border-bottom: 4px solid #000;
}

/* layout */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* panel */
.panel {
    background: #2d2d2d;
    border: 4px solid #000;
    padding: 20px;
    margin-bottom: 20px;
}

/* status */
.status {
    font-size: 18px;
    margin-bottom: 10px;
}

/* minecraft buttons */
button {
    font-family: "Press Start 2P";
    font-size: 10px;
    padding: 12px;
    border: 3px solid black;
    cursor: pointer;
    color: white;
}

.green { background: #3c8d2f; }
.red { background: #a83232; }
.blue { background: #2f5fa8; }

button:hover {
    filter: brightness(1.2);
}

/* grid buttons */
.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
}

/* console */
.console {
    background: black;
    height: 180px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    border: 3px solid #000;
    color: #55ff55;
}

/* label */
.label {
    font-family: "Press Start 2P";
    font-size: 10px;
    margin-bottom: 10px;
    color: #ccc;
}
</style>

</head>

<body>

<div class="top">
⛏ Minecraft Control Panel
</div>

<div class="container">

    <!-- STATUS -->
    <div class="panel">
        <div class="label">WORLD STATUS</div>
        <div class="status">State: <span id="state">Loading...</span></div>
        <div>Players: <span id="players">-</span></div>
    </div>

    <!-- CONTROLS -->
    <div class="panel">
        <div class="label">SERVER CONTROLS</div>

        <div class="buttons">
            <button class="green" onclick="start()">START</button>
            <button class="red" onclick="stop()">STOP</button>
            <button class="blue" onclick="restart()">RESTART</button>
        </div>

        <div class="buttons" style="margin-top:10px;">
            <button class="blue" onclick="cmd('gamemode survival')">SURVIVAL</button>
            <button class="blue" onclick="cmd('gamemode creative')">CREATIVE</button>
            <button class="blue" onclick="cmd('time set day')">DAY</button>
        </div>
    </div>

    <!-- CONSOLE -->
    <div class="panel">
        <div class="label">CHAT LOG</div>
        <div class="console" id="log"></div>
    </div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

function log(t){
    document.getElementById("log").innerHTML += "» " + t + "<br>";
}

function start(){
    fetch(API+"/start",{headers:{"x-api-key":KEY}});
    log("Server starting...");
}

function stop(){
    fetch(API+"/stop",{headers:{"x-api-key":KEY}});
    log("Server stopping...");
}

function restart(){
    fetch(API+"/restart",{headers:{"x-api-key":KEY}});
    log("Server restarting...");
}

function cmd(c){
    fetch(API+"/command",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "x-api-key":KEY
        },
        body:JSON.stringify({command:c})
    });

    log("Command: " + c);
}

async function update(){
    try {
        const res = await fetch(API+"/status");
        const data = await res.json();

        document.getElementById("state").innerText = data.state;
        document.getElementById("players").innerText = data.players;
    } catch {
        document.getElementById("state").innerText = "OFFLINE";
    }
}

setInterval(update, 3000);
update();

</script>

</body>
</html>
