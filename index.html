<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAX PANEL</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #050816;
    color: white;
}

.header {
    padding: 20px;
    background: #0f172a;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
}

button {
    padding: 12px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }

.console {
    height: 200px;
    background: black;
    padding: 10px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 12px;
}
</style>

</head>

<body>

<div class="header">
    <h2>🔥 MAX LEVEL SERVER PANEL</h2>
    <div id="status">Loading...</div>
</div>

<div class="container">

<div class="card">
    <h3>Controls</h3>

    <button class="blue" onclick="start()">Start</button>
    <button class="red" onclick="stop()">Stop</button>
    <button class="blue" onclick="restart()">Restart</button>

    <button class="green" onclick="cmd('gamemode survival')">Survival</button>

    <div id="players">Players: -</div>
</div>

<div class="card">
    <h3>Console</h3>
    <div class="console" id="log"></div>
</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

function log(t){
    document.getElementById("log").innerHTML += t + "<br>";
}

function start(){
    fetch(API+"/start",{headers:{"x-api-key":KEY}});
    log("🚀 start");
}

function stop(){
    fetch(API+"/stop",{headers:{"x-api-key":KEY}});
    log("⛔ stop");
}

function restart(){
    fetch(API+"/restart",{headers:{"x-api-key":KEY}});
    log("🔄 restart");
}

function cmd(c){
    fetch(API+"/command",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "x-api-key":KEY
        },
        body:JSON.stringify({command:c})
    });

    log("▶ "+c);
}

async function update(){
    const r = await fetch(API+"/status");
    const d = await r.json();

    document.getElementById("status").innerText =
        "STATE: " + d.state;

    document.getElementById("players").innerText =
        "Players: " + d.players;
}

setInterval(update, 3000);
update();

</script>

</body>
</html>
