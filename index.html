<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Minecraft Hosting Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Inter;
    background: radial-gradient(circle at top, #0b1220, #05070a);
    color: white;
}

header {
    text-align: center;
    padding: 30px;
}

h1 {
    font-family: "Press Start 2P";
    font-size: 16px;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 15px;
}

.badge {
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.online { background: #22c55e33; color: #22c55e; }
.offline { background: #ef444433; color: #ef4444; }
.starting { background: #facc1533; color: #facc15; }

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }

.console {
    background: black;
    height: 250px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 12px;
    padding: 10px;
}

input {
    padding: 8px;
    width: 80%;
    border-radius: 6px;
    border: none;
}

.small {
    font-size: 12px;
    color: #aaa;
}

.player {
    display: flex;
    justify-content: space-between;
    padding: 5px;
    background: rgba(255,255,255,0.05);
    margin-top: 5px;
    border-radius: 6px;
}
</style>
</head>

<body>

<header>
    <h1>MINECRAFT CONTROL PANEL</h1>
    <div class="small">ServerMiner-style Dashboard</div>
</header>

<div class="container">

<!-- STATUS -->
<div class="grid">

    <div class="card">
        <h3>Status</h3>
        <div id="status" class="badge offline">OFFLINE</div>
    </div>

    <div class="card">
        <h3>RAM Usage</h3>
        <div id="ram">-</div>
    </div>

    <div class="card">
        <h3>Server Controls</h3>
        <button class="green" onclick="start()">Start</button>
        <button class="red" onclick="stop()">Stop</button>
        <button class="blue" onclick="restart()">Restart</button>
    </div>

</div>

<br>

<div class="grid">

<!-- PLAYERS -->
<div class="card">
    <h3>Players Online</h3>
    <div id="players"></div>
</div>

<!-- OPERATOR PANEL -->
<div class="card">
    <h3>Operator Tools</h3>

    <input id="cmd" placeholder="command (op, give, tp, etc)">
    <button class="blue" onclick="sendCommand()">Send</button>

    <hr>

    <input id="playerName" placeholder="player name">

    <button class="red" onclick="kick()">Kick</button>
    <button class="red" onclick="ban()">Ban</button>
</div>

</div>

<br>

<!-- CONSOLE -->
<div class="card">
    <h3>Live Console</h3>
    <div class="console" id="console"></div>
</div>

</div>

<script>

// ================= CONFIG =================
const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

const socket = io(API);

const headers = {
    "Content-Type": "application/json",
    "x-api-key": KEY
};

// ================= STATUS =================
async function updateStatus(){
    const res = await fetch(API + "/status");
    const data = await res.json();

    const el = document.getElementById("status");

    if(data.state === "RUNNING"){
        el.innerText = "ONLINE";
        el.className = "badge online";
    } else if(data.state === "STARTING"){
        el.innerText = "STARTING";
        el.className = "badge starting";
    } else {
        el.innerText = "OFFLINE";
        el.className = "badge offline";
    }
}

// ================= RAM =================
async function updateRAM(){
    try {
        const res = await fetch(API + "/stats");
        const data = await res.json();

        document.getElementById("ram").innerText =
            `${data.ram}MB / ${data.totalRam}MB`;
    } catch {}
}

// ================= PLAYERS =================
async function updatePlayers(){
    try {
        const res = await fetch(API + "/players");
        const data = await res.json();

        document.getElementById("players").innerText = data.players;
    } catch {
        document.getElementById("players").innerText = "offline";
    }
}

// ================= COMMAND =================
function sendCommand(){
    const command = document.getElementById("cmd").value;

    fetch(API + "/command", {
        method:"POST",
        headers,
        body: JSON.stringify({ command })
    });

    document.getElementById("cmd").value = "";
}

// ================= KICK =================
function kick(){
    const player = document.getElementById("playerName").value;

    fetch(API + "/kick", {
        method:"POST",
        headers,
        body: JSON.stringify({ player })
    });
}

// ================= BAN =================
function ban(){
    const player = document.getElementById("playerName").value;

    fetch(API + "/ban", {
        method:"POST",
        headers,
        body: JSON.stringify({ player })
    });
}

// ================= SERVER CONTROLS =================
function start(){
    fetch(API + "/start", { method:"POST", headers });
}

function stop(){
    fetch(API + "/stop", { method:"POST", headers });
}

function restart(){
    fetch(API + "/restart", { method:"POST", headers });
}

// ================= LIVE CONSOLE (SOCKET) =================
socket.on("log", (msg) => {
    const box = document.getElementById("console");
    box.innerHTML += msg + "<br>";
    box.scrollTop = box.scrollHeight;
});

// ================= LOOP =================
setInterval(updateStatus, 3000);
setInterval(updateRAM, 3000);
setInterval(updatePlayers, 4000);

updateStatus();
updateRAM();
updatePlayers();

</script>

</body>
</html>
