<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: #0b1220;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #020617;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    font-size: 16px;
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    background: #111827;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* CARDS */
.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

button {
    padding: 8px 12px;
    margin: 4px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }
.gray { background: #374151; }

/* CONSOLE */
.console {
    background: black;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    color: #55ff55;
}

/* INPUT */
input {
    padding: 10px;
    width: 70%;
    border-radius: 6px;
    border: none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>MC PANEL</h2>
    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('console')">Console</button>
    <button onclick="show('operators')">Operator</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page">
    <div class="card">
        <h3>Status: <span id="status">OFFLINE</span></h3>
        <p>Players: <span id="players">-</span></p>

        <button class="green" onclick="start()">Start</button>
        <button class="red" onclick="stop()">Stop</button>
        <button class="blue" onclick="restart()">Restart</button>
    </div>
</div>

<!-- CONSOLE -->
<div id="console" class="page" style="display:none;">
    <div class="card">
        <div class="console" id="log"></div>

        <input id="cmdInput" placeholder="Type command...">
        <button onclick="runCmd()">Send</button>
    </div>
</div>

<!-- OPERATORS -->
<div id="operators" class="page" style="display:none;">

    <div class="card">
        <h3>Gamemode</h3>
        <button onclick="cmd('gamemode creative @a')">Creative</button>
        <button onclick="cmd('gamemode survival @a')">Survival</button>
        <button onclick="cmd('gamemode spectator @a')">Spectator</button>
    </div>

    <div class="card">
        <h3>Time</h3>
        <button onclick="cmd('time set day')">Day</button>
        <button onclick="cmd('time set night')">Night</button>
    </div>

    <div class="card">
        <h3>Weather</h3>
        <button onclick="cmd('weather clear')">Clear</button>
        <button onclick="cmd('weather rain')">Rain</button>
        <button onclick="cmd('weather thunder')">Thunder</button>
    </div>

    <div class="card">
        <h3>Difficulty</h3>
        <button onclick="cmd('difficulty peaceful')">Peaceful</button>
        <button onclick="cmd('difficulty hard')">Hard</button>
    </div>

</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

const headers = {
    "Content-Type": "application/json",
    "x-api-key": KEY
};

/* NAV */
function show(page){
    document.querySelectorAll(".page").forEach(p => p.style.display="none");
    document.getElementById(page).style.display="block";
}

/* LOG */
function log(t){
    document.getElementById("log").innerHTML += "» " + t + "<br>";
}

/* SERVER */
function send(path, msg){
    log(msg);
    fetch(API + path, { method:"POST", headers });
}

function start(){ send("/start","Starting server"); }
function stop(){ send("/stop","Stopping server"); }
function restart(){ send("/restart","Restarting server"); }

/* COMMAND */
function cmd(command){
    log("Running: " + command);

    fetch(API + "/command", {
        method:"POST",
        headers,
        body: JSON.stringify({ command })
    });
}

function runCmd(){
    const val = document.getElementById("cmdInput").value;
    if(!val) return;
    cmd(val);
}

/* STATUS */
async function update(){
    try{
        const res = await fetch(API + "/status");
        const data = await res.json();

        document.getElementById("status").innerText = data.state;
        document.getElementById("players").innerText = data.players;

    }catch{
        log("Cannot reach server");
    }
}

setInterval(update,3000);
update();

</script>

</body>
</html>
