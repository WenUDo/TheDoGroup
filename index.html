<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EpicCraft Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(#1b3a1b, #0b0f14);
    color: white;
    font-family: Inter;
}

/* HEADER */
header {
    background: #2c2416;
    padding: 18px;
    text-align: center;
    font-family: "Press Start 2P";
    font-size: 12px;
    border-bottom: 4px solid black;
}

/* LAYOUT */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* CARDS */
.card {
    background: #1a1f27;
    border: 3px solid black;
    padding: 20px;
    margin-bottom: 20px;
}

/* STATUS */
.status {
    font-family: "Press Start 2P";
    font-size: 10px;
    margin-bottom: 10px;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

/* BUTTONS */
button {
    font-family: "Press Start 2P";
    font-size: 10px;
    padding: 12px;
    border: 3px solid black;
    cursor: pointer;
    color: white;
}

.start { background: #22c55e; }
.stop { background: #ef4444; }
.restart { background: #3b82f6; }

button:hover {
    filter: brightness(1.2);
}

/* GRID */
.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
}

/* CONSOLE */
.console {
    background: black;
    height: 180px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    color: #55ff55;
    border: 3px solid black;
}
</style>

</head>

<body>

<header>
⛏ EPICCRAFT CONTROL PANEL
</header>

<div class="container">

    <!-- STATUS -->
    <div class="card">
        <div class="status">WORLD STATUS: <span id="state">Loading...</span></div>
        <div>Players: <span id="players">-</span></div>
    </div>

    <!-- CONTROLS -->
    <div class="card">
        <div class="buttons">
            <button class="start" onclick="start()">START</button>
            <button class="stop" onclick="stop()">STOP</button>
            <button class="restart" onclick="restart()">RESTART</button>
        </div>
    </div>

    <!-- CONSOLE -->
    <div class="card">
        <div class="console" id="log"></div>
    </div>

</div>

<script>

const API = "https://YOUR-NGROK-LINK.ngrok-free.dev";
const KEY = "my-secret-key-123";

/* shared headers (IMPORTANT FIX) */
const headers = {
    "Content-Type": "application/json",
    "x-api-key": KEY
};

function log(t){
    document.getElementById("log").innerHTML += "» " + t + "<br>";
}

/* START */
function start(){
    fetch(API + "/start", {
        method: "POST",
        headers
    });

    log("🚀 Starting server...");
}

/* STOP */
function stop(){
    fetch(API + "/stop", {
        method: "POST",
        headers
    });

    log("⛔ Stopping server...");
}

/* RESTART */
function restart(){
    fetch(API + "/restart", {
        method: "POST",
        headers
    });

    log("🔄 Restarting server...");
}

/* STATUS */
async function update(){
    try {
        const res = await fetch(API + "/status");
        const data = await res.json();

        document.getElementById("state").innerText = data.state;
        document.getElementById("players").innerText = data.players;

    } catch {
        document.getElementById("state").innerText = "OFFLINE";
    }
}

setInterval(update, 3000);
update();

</script>

</body>
</html>
