<!DOCTYPE html>
<html>
<head>
<title>Minecraft Hosting Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f14;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
}

.panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

.box {
    background: #1a1a22;
    padding: 15px;
    border-radius: 10px;
}

button {
    margin: 5px;
    padding: 10px;
    cursor: pointer;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }

.console {
    height: 200px;
    overflow: auto;
    background: black;
    padding: 10px;
    font-size: 12px;
}

.player {
    display: flex;
    justify-content: space-between;
    padding: 5px;
    background: #222;
    margin: 3px;
}
</style>
</head>

<body>

<header>🔥 MINECRAFT HOSTING PANEL (V102)</header>

<div class="panel">

<div class="box">
<h3>Server Controls</h3>
<button class="green" onclick="start()">Start</button>
<button class="red" onclick="stop()">Stop</button>
<button class="blue" onclick="restart()">Restart</button>

<p id="status">Status: ...</p>
</div>

<div class="box">
<h3>Players</h3>
<div id="players"></div>
</div>

<div class="box">
<h3>Console</h3>
<div class="console" id="console"></div>
</div>

<div class="box">
<h3>Command</h3>
<input id="cmd" placeholder="command..." />
<button onclick="sendCmd()">Send</button>
</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

function api(path, method="GET", body=null){
    return fetch(API + path, {
        method,
        headers: {
            "Content-Type":"application/json",
            "x-api-key": KEY
        },
        body: body ? JSON.stringify(body) : null
    });
}

function start(){ api("/start","POST"); }
function stop(){ api("/stop","POST"); }
function restart(){ api("/restart","POST"); }

function sendCmd(){
    let c = document.getElementById("cmd").value;
    api("/command","POST",{command:c});
}

async function update(){

    let s = await api("/status").then(r=>r.json());
    document.getElementById("status").innerText = "Status: " + s.state;

    let p = await api("/players").then(r=>r.json());
    document.getElementById("players").innerText = p.players;

    let c = await api("/console").then(r=>r.json());
    document.getElementById("console").innerHTML =
        c.logs.map(l=>"» "+l).join("<br>");

}

setInterval(update,2000);
update();

</script>

</body>
</html>
