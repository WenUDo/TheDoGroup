<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: radial-gradient(circle at top, #0b1220, #05070a);
    color: white;
}

header {
    text-align: center;
    padding: 40px;
}

h1 {
    font-family: "Press Start 2P";
    font-size: 18px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.08);
}

.badge {
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.online { background: #22c55e33; color: #22c55e; }
.offline { background: #ef444433; color: #ef4444; }

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }

.console {
    background: black;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
}

input {
    padding: 8px;
    width: 80%;
    border-radius: 6px;
    border: none;
}

.small {
    font-size: 12px;
    color: #aaa;
}
</style>

</head>

<body>

<header>
    <h1>MINECRAFT CONTROL PANEL</h1>
    <div class="small">Server Hosting Dashboard</div>
</header>

<div class="grid">

    <!-- STATUS -->
    <div class="card">
        <h3>Status</h3>
        <div id="status" class="badge offline">OFFLINE</div>
    </div>

    <!-- PLAYERS -->
    <div class="card">
        <h3>Players</h3>
        <div id="players">-</div>
    </div>

    <!-- RAM -->
    <div class="card">
        <h3>RAM Usage</h3>
        <div id="ram">-</div>
    </div>

    <!-- CONTROLS -->
    <div class="card">
        <h3>Server Controls</h3>
        <button class="green" onclick="start()">Start</button>
        <button class="red" onclick="stop()">Stop</button>
        <button class="blue" onclick="restart()">Restart</button>
    </div>

    <!-- OPERATORS -->
    <div class="card">
        <h3>Operator Commands</h3>

        <input id="cmd" placeholder="kick / ban / give / op player">
        <button class="blue" onclick="sendCmd()">Send Command</button>
    </div>

    <!-- COPY IP -->
    <div class="card">
        <h3>Server IP</h3>
        <div>play.yourserver.com</div>
        <button class="green" onclick="copyIP()">Copy IP</button>
    </div>

</div>

<!-- CONSOLE -->
<div class="grid">
    <div class="card" style="grid-column:1/-1;">
        <h3>Live Console</h3>
        <div class="console" id="console"></div>
    </div>
</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

const headers = {
    "Content-Type": "application/json",
    "x-api-key": KEY
};

// ---------------- STATUS ----------------
async function updateStatus(){
    try {
        const res = await fetch(API + "/status");
        const data = await res.json();

        const el = document.getElementById("status");

        if(data.online){
            el.innerText = "ONLINE";
            el.className = "badge online";
        } else {
            el.innerText = "OFFLINE";
            el.className = "badge offline";
        }

    } catch {
        document.getElementById("status").innerText = "OFFLINE";
    }
}

// ---------------- PLAYERS ----------------
async function updatePlayers(){
    try {
        const res = await fetch(API + "/players");
        const data = await res.json();
        document.getElementById("players").innerText = data.players;
    } catch {
        document.getElementById("players").innerText = "error";
    }
}

// ---------------- RAM ----------------
async function updateRAM(){
    try {
        const res = await fetch(API + "/stats");
        const data = await res.json();

        document.getElementById("ram").innerText =
            `Used: ${data.ramUsedMB}MB / ${data.totalRAM}MB`;

    } catch {
        document.getElementById("ram").innerText = "error";
    }
}

// ---------------- CONSOLE ----------------
async function updateConsole(){
    try {
        const res = await fetch(API + "/console");
        const data = await res.json();

        const box = document.getElementById("console");
        box.innerHTML = data.logs.join("<br>");
        box.scrollTop = box.scrollHeight;

    } catch {}
}

// ---------------- ACTIONS ----------------
function start(){
    fetch(API + "/start", { method:"POST", headers });
}

function stop(){
    fetch(API + "/stop", { method:"POST", headers });
}

function restart(){
    fetch(API + "/restart", { method:"POST", headers });
}

// ---------------- COMMAND ----------------
function sendCmd(){
    const cmd = document.getElementById("cmd").value;

    fetch(API + "/command", {
        method:"POST",
        headers,
        body: JSON.stringify({ command: cmd })
    });

    document.getElementById("cmd").value = "";
}

// ---------------- COPY IP ----------------
function copyIP(){
    navigator.clipboard.writeText("play.yourserver.com");
}

// ---------------- LOOPS ----------------
setInterval(updateStatus, 3000);
setInterval(updatePlayers, 4000);
setInterval(updateRAM, 4000);
setInterval(updateConsole, 2000);

updateStatus();
updatePlayers();
updateRAM();
updateConsole();

</script>

</body>
</html>
