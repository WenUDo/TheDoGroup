<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Server Panel v104</title>

<style>
    body{background:#0b0f14;color:white;font-family:Arial;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:20px}
    .box{background:#151b22;padding:15px;border-radius:10px}
    .console{height:200px;overflow:auto;background:black;padding:10px}
    button{margin:3px;padding:8px}
</style>
</head>

<body>
<h2 style="text-align:center">🔥 FULL HOSTING PANEL v104</h2>

<div class="grid">

  <!-- Controls -->
  <div class="box"><h3>Controls</h3>
      <button onclick="start()">Start</button>
      <button onclick="stop()">Stop</button>
      <button onclick="restart()">Restart</button>
      <p id="state"></p>
      <p id="ram"></p>
  </div>

  <!-- Players -->
  <div class="box"><h3>Players</h3><div id="players"></div></div>

  <!-- Console -->
  <div class="box"><h3>Console</h3>
      <div class="console" id="console"></div>
  </div>

  <!-- Command -->
  <div class="box"><h3>Command</h3>
    <input id="cmd">
    <button onclick="send()">Send</button>
  </div>

  <!-- File Manager -->
  <div class="box"><h3>File Manager</h3>
      <button onclick="files()">Load Files</button>
      <div id="files"></div>
  </div>

  <!-- Operator Panel – NEW -->
  <div class="box"><h3>Operator Panel</h3>
      <input id="player-name" placeholder="Player name">
      <button onclick="op()">OP</button>
      <button onclick="deop()">DEOP</button>
      <button onclick="kick()">KICK</button>
      <button onclick="ban()">BAN</button><br>
      <button onclick="gm('creative')">Creative</button>
      <button onclick="time()">Time</button>
      <button onclick="weather()">Weather</button>
  </div>

</div> <!-- end grid -->

<script>
// ────── Helper to call the API (fetch & send) ─────────────────────────
async function fetchAPI(method, body = {}) {
    const r = await fetch(`${API}/${method}`,{
        method:"POST",
        headers:{ "Content-Type":"application/json","X-Auth":KEY},
        body:JSON.stringify(body)
    }).then(r=>r.json());
    return r;
}

// ────── WebSocket helpers (server state) ───────────────────────────
wss.onmessage = e=>{
  const msg = JSON.parse(e.data);
  if(msg.type==="state") {
      document.getElementById("state").innerText=msg.state;
      // RAM line now shows both values in one string
      document.getElementById("ram").innerText=`RAM: ${msg.ram} MB | CPU: ${msg.cpu} %`;
  }
};

// ────── Controls helpers – start/stop/restart ───────────────────────
function start(){fetchAPI('start').then(r=>{state=r.ok? 'RUNNING':'STOPPED'; document.getElementById("state").innerText=state;});}
function stop (){ fetchAPI('stop') .then(r=>{state=r.ok?'STOPPED':'';document.getElementById("state").innerText=state;});}
function restart(){fetchAPI('restart').then(()=>setTimeout(()=>window.location.reload(),2000));}

// ────── Players list
function players(){
    fetch(`${API}/players`).then(r=>{document.getElementById("players").innerHTML=r.players.map(p=>`<div>${p}</div>`).join('');});
}

// ────── Console helper
function send(){fetchAPI('send',{cmd:document.getElementById('cmd').value}).then(()=>refreshConsole());}
function refreshConsole(){
    fetch(`${API}/console`).then(r=>{document.getElementById("console").innerHTML+=r.console;});
}

// ────── File manager
async function files(){ const r = await fetch(`${API}/files`); document.getElementById("files").innerText=r.files.join(', '); }

// ────── Operator panel helpers – NEW ───────────────────────────
function playerName(){ return document.getElementById("player-name").value; }

function op()   {fetchAPI('op',    {player:playerName()}).then(()=>{refreshConsole();});}
function deop() {fetchAPI('deop',  {player:playerName()}).then(()=>{refreshConsole();});}
function kick(){fetchAPI('kick',  {cmd:'kick '+playerName()}).then(()=>{refreshConsole();});}
function ban()  {fetchAPI('ban',   {cmd:'ban '+playerName()}).then(()=>{refreshConsole();});}
function gm(mode){ fetchAPI('gamemode',{mode,player:playerName()}).then(()=>{refreshConsole();}); }
function time(){ fetchAPI('time' , {value:"creative"}).then(()=>{refreshConsole();}); }
function weather(){fetchAPI('weather', {type:'sunny'}).then(()=>{refreshConsole();}); }

// ────── Periodic refresher – update UI every 2s ─────────────────────
setInterval(async ()=>{
    const r = await fetch(`${API}/status`);
    document.getElementById("state").innerText=r.state;
    document.getElementById("ram").innerText=`RAM: ${r.ram} MB | CPU: ${r.cpu}%`;
    // update players list every 2s
    const p = await fetch(`${API}/players`).then(r=>r.json());
    document.getElementById("players").innerHTML=p.players.map(p=>`<div>${p}</div>`).join('');
},2000);
</script>
</body>
</html>
