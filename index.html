<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: #0b1220;
    color: white;
}

header {
    text-align: center;
    padding: 40px;
}

h1 {
    font-family: "Press Start 2P";
    font-size: 16px;
}

.section {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.blue { background: #3b82f6; }
.gray { background: #374151; }

.console {
    background: black;
    height: 150px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    color: #55ff55;
    border-radius: 10px;
}

input {
    padding: 10px;
    width: 70%;
    border-radius: 8px;
    border: none;
}
</style>

</head>

<body>

<header>
    <h1>MINECRAFT CONTROL PANEL</h1>
</header>

<div class="section">

<h2>Server</h2>
<button class="green" onclick="start()">Start</button>
<button class="red" onclick="stop()">Stop</button>
<button class="blue" onclick="restart()">Restart</button>

<h2>Gamemode</h2>
<button onclick="cmd('gamemode creative @a')">Creative</button>
<button onclick="cmd('gamemode survival @a')">Survival</button>
<button onclick="cmd('gamemode adventure @a')">Adventure</button>
<button onclick="cmd('gamemode spectator @a')">Spectator</button>

<h2>Difficulty</h2>
<button onclick="cmd('difficulty peaceful')">Peaceful</button>
<button onclick="cmd('difficulty easy')">Easy</button>
<button onclick="cmd('difficulty normal')">Normal</button>
<button onclick="cmd('difficulty hard')">Hard</button>

<h2>Time</h2>
<button onclick="cmd('time set day')">Day</button>
<button onclick="cmd('time set noon')">Noon</button>
<button onclick="cmd('time set night')">Night</button>
<button onclick="cmd('time set midnight')">Midnight</button>

<h2>Weather</h2>
<button onclick="cmd('weather clear')">Clear</button>
<button onclick="cmd('weather rain')">Rain</button>
<button onclick="cmd('weather thunder')">Thunder</button>

<h2>Quick Actions</h2>
<button onclick="cmd('kill @e[type=!player]')">Kill All Mobs</button>
<button onclick="cmd('give @p diamond_sword')">Gi_
