<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Server Control Panel</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color: white;
    overflow-x: hidden;
}

/* HEADER */
.header {
    text-align: center;
    padding: 60px 20px 20px;
}

.header h1 {
    font-size: 48px;
    margin: 0;
    text-shadow: 0 0 20px #3b82f6;
}

.header p {
    color: #94a3b8;
    margin-top: 10px;
}

/* IP BOX */
.ip-box {
    margin: 20px auto;
    background: rgba(30, 41, 59, 0.8);
    width: fit-content;
    padding: 10px 20px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid #3b82f6;
    transition: 0.2s;
}

.ip-box:hover {
    transform: scale(1.05);
}

/* PANEL */
.panel {
    max-width: 500px;
    margin: 40px auto;
    background: rgba(30, 41, 59, 0.9);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(59,130,246,0.3);
    text-align: center;
}

/* BUTTONS */
button {
    width: 90%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
    color: white;
}

.survival {
    background: #3b82f6;
}

.hardcore {
    background: #f59e0b;
}

.stop {
    background: #ef4444;
}

button:hover {
    transform: scale(1.05);
}

/* STATUS */
.status {
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}

/* GLOW EFFECT */
.glow {
    position: absolute;
    width: 400px;
    height: 400px;
    background: #3b82f6;
    filter: blur(150px);
    opacity: 0.2;
    top: -100px;
    left: -100px;
    z-index: -1;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="header">
    <h1>🔥 My Minecraft Server</h1>
    <p>The cleanest, most OP server control panel</p>

    <div class="ip-box" onclick="copyIP()">
        🌍 flashy-stardust-endless.ngrok-free.dev (click to copy)
    </div>
</div>

<div class="panel">

    <h2>🎮 Control Panel</h2>

    <button class="survival" onclick="send('/survival')">🟢 Survival Mode</button>

    <button class="hardcore" onclick="send('/hardcore')">☠️ Hardcore Mode</button>

    <button class="stop" onclick="send('/stop')">🔴 Stop Server</button>

    <div class="status" id="status">Ready to dominate your server 😎</div>

</div>

<script>

// YOUR NGROK LINK (already plugged in)
const baseURL = "https://flashy-stardust-endless.ngrok-free.dev";

// send command
function send(endpoint){
    fetch(baseURL + endpoint, {
        method: "POST"
    })
    .then(() => {
        document.getElementById("status").innerText =
        "Sent: " + endpoint;
    })
    .catch(() => {
        document.getElementById("status").innerText =
        "Error sending command";
    });
}

// copy IP
function copyIP(){
    navigator.clipboard.writeText("flashy-stardust-endless.ngrok-free.dev");
    alert("IP copied!");
}

</script>

</body>
</html>
