<!DOCTYPE html>
<html>
<head>
<title>Server Panel v103</title>
<style>
body{background:#0b0f14;color:white;font-family:Arial;margin:0}
.panel{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:20px}
.box{background:#151b22;padding:15px;border-radius:10px}
button{margin:3px;padding:8px}
.console{height:200px;overflow:auto;background:black;padding:10px}
.player{display:flex;justify-content:space-between}
</style>
</head>

<body>

<h2 style="text-align:center">🔥 SERVERMINER STYLE PANEL v103</h2>

<div class="panel">

<div class="box">
<h3>Controls</h3>
<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="restart()">Restart</button>
<p id="state">...</p>
<p id="ram"></p>
</div>

<div class="box">
<h3>Players</h3>
<div id="players"></div>
</div>

<div class="box">
<h3>Console</h3>
<div class="console" id="console"></div>
</div>

<div class="box">
<h3>Command</h3>
<input id="cmd">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "my-secret-key-123";

// websocket live console
const ws = new WebSocket(API.replace("https","wss"));

ws.onmessage = (msg)=>{
    const data = JSON.parse(msg.data);

    if(data.type === "log"){
        document.getElementById("console").innerHTML += "» "+data.data+"<br>";
    }
};

// API helper
function api(p,m="GET",b=null){
return fetch(API+p,{
method:m,
headers:{
"Content-Type":"application/json",
"x-api-key":KEY
},
body:b?JSON.stringify(b):null
});
}

function start(){api("/start","POST")}
function stop(){api("/stop","POST")}
function restart(){api("/restart","POST")}

function send(){
api("/command","POST",{command:cmd.value});
}

// live update
setInterval(async()=>{
let s = await api("/status").then(r=>r.json());
state.innerText = s.state;
ram.innerText = "RAM: "+s.ram.used.toFixed(1)+"MB";

let p = await api("/players").then(r=>r.json());
players.innerHTML = p.players;

},2000);

</script>

</body>
</html>
