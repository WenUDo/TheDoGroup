<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Control Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* layout */
.container {
    display: grid;
    grid-template-columns: 250px 1fr;
    height: 100vh;
}

/* sidebar */
.sidebar {
    background: #111827;
    padding: 20px;
}

.sidebar h2 {
    color: #3b82f6;
}

.tab {
    padding: 10px;
    margin: 10px 0;
    background: #1f2937;
    border-radius: 8px;
    cursor: pointer;
}

.tab:hover {
    background: #3b82f6;
}

/* main */
.main {
    padding: 30px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* buttons */
button {
    padding: 12px;
    margin: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.green { background: #22c55e; }
.yellow { background: #eab308; }
.red { background: #ef4444; }

/* console */
.console {
    height: 200px;
    background: black;
    padding: 10px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 12px;
}
</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔥 Server Panel</h2>
    <div class="tab">Dashboard</div>
    <div class="tab">Controls</div>
    <div class="tab">Console</div>

    <p id="statusText">Checking...</p>
</div>

<!-- MAIN -->
<div class="main">

    <div class="card">
        <h2>🌍 Server Status</h2>
        <p id="status">Loading...</p>
        <p id="players"></p>
    </div>

    <div class="card">
        <h2>🎮 Controls</h2>

        <button class="green" onclick="cmd('gamemode survival')">Survival</button>
        <button class="yellow" onclick="cmd('difficulty hard')">Hard Mode</button>
        <button class="red" onclick="cmd('stop')">Stop Server</button>
    </div>

    <div class="card">
        <h2>💻 Console</h2>
        <div class="console" id="console"></div>
    </div>

</div>

</div>

<script>

const API = "https://flashy-stardust-endless.ngrok-free.dev";
const KEY = "TDG2427";

// send command
function cmd(command){
    fetch(API + "/command", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": KEY
        },
        body: JSON.stringify({ command })
    })
    .then(r => r.json())
    .then(data => {
        log("✔ " + command);
    });
}

// log console
function log(text){
    document.getElementById("console").innerHTML += text + "<br>";
}

// live status
async function update(){
    try {
        let res = await fetch(API + "/status");
        let data = await res.json();

        document.getElementById("status").innerText =
            data.online ? "🟢 Online" : "🔴 Offline";

        document.getElementById("players").innerText =
            data.players;
    } catch {
        document.getElementById("status").innerText = "🔴 Offline";
    }
}

setInterval(update, 5000);
update();

</script>

</body>
</html>
