<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EpicCraft Network</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: radial-gradient(circle at top, #0f1a12, #05070a);
    color: white;
    overflow-x: hidden;
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px;
}

h1 {
    font-family: "Press Start 2P";
    font-size: 20px;
    margin-bottom: 10px;
}

.ip {
    color: #9ca3af;
}

/* STATUS BADGE */
.badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    margin-top: 10px;
}

.online { background: #1f6f3b; color: #22c55e; }
.offline { background: #3a1f1f; color: #ef4444; }
.starting { background: #2d2a1f; color: #facc15; }

/* LAYOUT */
section {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
}

/* BUTTONS */
button {
    padding: 10px 14px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.15s;
}

button:hover {
    transform: scale(1.05);
}

.green { background: #22c55e; color: black; }
.red { background: #ef4444; color: white; }
.blue { background: #3b82f6; color: white; }

/* CONSOLE */
.console {
    background: black;
    height: 180px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    color: #55ff55;
    border-radius: 8px;
}

/* FLOATING GRID (MINECRAFT WORLD FEEL) */
.grid {
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveGrid 20s linear infinite;
    z-index: -1;
}

@keyframes moveGrid {
    from { transform: translate(0,0); }
    to { transform: translate(-40px,-40px); }
}
</style>

</head>

<body>

<div class="grid"></div>

<header>
    <h1>⛏ EPICCRAFT NETWORK</h1>
    <div class="ip">play.epiccraft.com</div>

    <div id="badge" class="badge offline">OFFLINE</div>
</header>

<!-- STATUS -->
<section>
    <div class="card">
        <h2>Server Status</h2>
        Players: <span id="players">-</span>
    </div>
</section>

<!-- CONTROL CORE -->
<section>
    <div class="card">
        <h2>Control Core</h2>

        <button class="green" onclick="start()">START</button>
        <button class="red" onclick="stop()">STOP</button>
        <button class="blue" onclick="restart()">RESTART</button>

        <h3>Live Console</h3>
        <div class="console" id="log"></div>
    </div>
</section>

<footer style="text-align:center; padding:30px; color:#666;">
    EpicCraft Survival Network
</footer>

<script>

const API = "https://YOUR-NGROK-LINK.ngrok-free.dev";
const KEY = "my-secret-key-123";

const headers = {
    "Content-Type": "application/json",
    "x-api-key": KEY
};

let busy = false;

/* LOG */
function log(t){
    document.getElementById("log").innerHTML += "» " + t + "<br>";
}

/* SAFE ACTION WRAPPER */
function send(path, msg){
    if(busy) return;

    busy = true;
    log(msg);

    fetch(API + path, { method: "POST", headers })
    .catch(() => log("⚠ Connection error"))
    .finally(() => setTimeout(() => busy = false, 2000));
}

/* CONTROLS */
function start(){ send("/start", "🚀 Starting server..."); }
function stop(){ send("/stop", "⛔ Stopping server..."); }
function restart(){ send("/restart", "🔄 Restarting server..."); }

/* STATUS */
async function update(){
    try {
        const res = await fetch(API + "/status");
        const data = await res.json();

        document.getElementById("players").innerText = data.players;

        const badge = document.getElementById("badge");

        if(data.state === "RUNNING"){
            badge.className = "badge online";
            badge.innerText = "ONLINE";
        }
        else if(data.state === "STARTING"){
            badge.className = "badge starting";
            badge.innerText = "STARTING";
        }
        else {
            badge.className = "badge offline";
            badge.innerText = "OFFLINE";
        }

    } catch {
        document.getElementById("badge").innerText = "OFFLINE";
    }
}

setInterval(update, 3000);
update();

</script>

</body>
</html>
